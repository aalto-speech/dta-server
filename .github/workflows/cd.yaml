name: CD

on:
  push:
    branches: [dev]
  release:
    types: [published]
  pull_request:
    branches: [dev]

jobs:
  build-and-deploy:
    name: Build and deploy on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read
      packages: write

    env:
      IMAGE_NAME: ghcr.io/${{ github.repository }}
      TAG_NAME: ${{ github.ref_name }}

    strategy:
      matrix:
        os: ["ubuntu-24.04"]

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and tag container image
        run: |
          if [[ "$GITHUB_EVENT_NAME" == "release" ]]; then
            podman build --pull \
              --tag $IMAGE_NAME:latest \
              --tag $IMAGE_NAME:$TAG_NAME \
              .
          else
            podman build --pull \
              --tag $IMAGE_NAME:$TAG_NAME \
              .
          fi

      - name: Push container images to GitHub Container Registry
        run: |
          if [[ "$GITHUB_EVENT_NAME" == "release" ]]; then
            podman push $IMAGE_NAME:latest
            podman push $IMAGE_NAME:$TAG_NAME
          else
            podman push $IMAGE_NAME:$TAG_NAME
          fi

name: CI

on:
  push:
    branches: [dev]
  pull_request:
    branches: [dev, main]

jobs:
  lint-and-test:
    name: Lint and test on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: ["ubuntu-24.04"]

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Miniconda
        uses: conda-incubator/setup-miniconda@v3
        with:
          auto-update-conda: true
          environment-file: environment.yaml

      - name: Check conda and Python version
        shell: bash -l {0}
        run: |
          conda info
          python --version

      - name: Install lint and test dependencies
        shell: bash -l {0}
        run: |
          conda install -c conda-forge pylint pytest

      - name: Lint with pylint
        shell: bash -l {0}
        run: |
          pylint app/

      - name: Run tests
        shell: bash -l {0}
        run: |
          pytest tests/
